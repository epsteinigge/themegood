<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Login | ThemeGood</title>
  <link rel="icon" type="image/png" href="/photos/New_Theme Good Logo-02.png">
  <link rel="apple-touch-icon" href="/photos/New_Theme Good Logo-02.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="overrides.css">
  <link rel="stylesheet" href="premium.css?v=41">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Nunito+Sans:wght@400;500;600;700;800&display=swap">
  <style>
    body {
      margin: 0;
      font-family: "Nunito Sans", Arial, sans-serif;
      color: #1a2234;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 212, 220, 0.35), transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(217, 232, 255, 0.4), transparent 44%),
        linear-gradient(180deg, #f9fbff 0%, #f2f5fb 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .login-shell {
      width: min(480px, 100%);
      background: #fff;
      border: 1px solid #e6ebf3;
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(23, 32, 51, 0.12);
      padding: 24px;
      display: grid;
      gap: 16px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-row img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      border-radius: 10px;
      background: #fff7f9;
      border: 1px solid #f3d3db;
      padding: 4px;
    }

    .brand-row h1 {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      font-size: 1.15rem;
      color: #142036;
    }

    .muted {
      margin: 0;
      color: #5f6b80;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: #1d2a42;
    }

    input[type="number"] {
      width: 100%;
      min-height: 48px;
      border: 1px solid #ccd5e4;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input[type="number"]:focus {
      border-color: #b32038;
      box-shadow: 0 0 0 3px rgba(179, 32, 56, 0.16);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .primary-btn,
    .secondary-btn {
      min-height: 44px;
      border-radius: 12px;
      border: none;
      padding: 0 16px;
      cursor: pointer;
      font-weight: 700;
    }

    .primary-btn {
      color: #fff;
      background: linear-gradient(135deg, #b32038, #8f182a);
    }

    .secondary-btn {
      color: #20314a;
      background: #eef3fc;
      border: 1px solid #d7e0ee;
    }

    .status {
      min-height: 22px;
      margin: 0;
      font-weight: 700;
    }

    .status.error { color: #b42318; }
    .status.ok { color: #15803d; }
  </style>
</head>
<body>
  <main class="login-shell">
    <div class="brand-row">
      <img src="/photos/Theme Good Logo-03.png" alt="ThemeGood logo">
      <h1>Customer Login</h1>
    </div>

    <p class="muted">Login with your customer ID to access your loyalty points, referral details, and order checkout benefits.</p>

    <form id="requestOtpForm">
      <label for="phoneInput">Phone Number</label>
      <input id="phoneInput" type="tel" required placeholder="e.g. 0123456789">
      <div class="actions" style="margin-top:14px;">
        <button type="submit" class="primary-btn">Send OTP via WhatsApp</button>
        <button id="goHomeBtn" type="button" class="secondary-btn">Back to Home</button>
      </div>
    </form>

    <form id="verifyOtpForm" style="display:none;">
      <label for="otpInput">OTP Code</label>
      <input id="otpInput" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" required placeholder="Enter 6-digit OTP">
      <div class="actions" style="margin-top:14px;">
        <button type="submit" class="primary-btn">Verify & Login</button>
        <button id="resendOtpBtn" type="button" class="secondary-btn">Resend OTP</button>
      </div>
    </form>

    <p id="statusText" class="status"></p>
  </main>

  <script>
    const CUSTOMER_ID_STORAGE_KEY = "themegood_customer_id";
    const CUSTOMER_TOKEN_STORAGE_KEY = "themegood_customer_token";

    function parseCustomerId(value) {
      const id = Number(value);
      return Number.isInteger(id) && id > 0 ? id : null;
    }

    function setStatus(message, type = "") {
      const status = document.getElementById("statusText");
      if (!status) return;
      status.className = `status ${type}`.trim();
      status.textContent = message || "";
    }

    function normalizePhone(value) {
      return String(value || "").replace(/\D/g, "");
    }

    const requestOtpForm = document.getElementById("requestOtpForm");
    const verifyOtpForm = document.getElementById("verifyOtpForm");
    const phoneInput = document.getElementById("phoneInput");
    const otpInput = document.getElementById("otpInput");
    const goHomeBtn = document.getElementById("goHomeBtn");
    const resendOtpBtn = document.getElementById("resendOtpBtn");
    let currentPhone = "";

    const existingCustomerId = parseCustomerId(localStorage.getItem(CUSTOMER_ID_STORAGE_KEY));
    const existingToken = String(localStorage.getItem(CUSTOMER_TOKEN_STORAGE_KEY) || "").trim();
    if (existingCustomerId && existingToken) {
      setStatus(`Already logged in as customer #${existingCustomerId}. Redirecting...`, "ok");
      setTimeout(() => {
        window.location.href = `account.html?customer_id=${encodeURIComponent(String(existingCustomerId))}`;
      }, 220);
    }

    async function requestOtp() {
      const phone = normalizePhone(phoneInput?.value);
      if (!phone || phone.length < 9) {
        setStatus("Please enter a valid phone number.", "error");
        return;
      }
      setStatus("Sending OTP to WhatsApp...", "");
      const response = await fetch("/api/customer/auth/request-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ phone })
      });
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || "Failed to send OTP.");
      }
      currentPhone = phone;
      verifyOtpForm.style.display = "";
      setStatus("OTP sent. Please check your WhatsApp.", "ok");
    }

    requestOtpForm?.addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        await requestOtp();
      } catch (error) {
        setStatus(error.message || "Failed to send OTP.", "error");
      }
    });

    verifyOtpForm?.addEventListener("submit", async (event) => {
      event.preventDefault();
      const otp = String(otpInput?.value || "").trim();
      if (!currentPhone) {
        setStatus("Please request OTP first.", "error");
        return;
      }
      if (!/^\d{6}$/.test(otp)) {
        setStatus("Please enter a valid 6-digit OTP.", "error");
        return;
      }

      try {
        setStatus("Verifying OTP...", "");
        const response = await fetch("/api/customer/auth/verify-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            phone: currentPhone,
            otp
          })
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "Failed to verify OTP.");
        }

        const customerId = parseCustomerId(payload?.customer?.id);
        const token = String(payload?.token || "").trim();
        if (!customerId || !token) {
          throw new Error("Login session payload is incomplete.");
        }

        localStorage.setItem(CUSTOMER_ID_STORAGE_KEY, String(customerId));
        localStorage.setItem(CUSTOMER_TOKEN_STORAGE_KEY, token);
        setStatus(`Logged in successfully as customer #${customerId}. Redirecting...`, "ok");
        setTimeout(() => {
          window.location.href = `account.html?customer_id=${encodeURIComponent(String(customerId))}`;
        }, 220);
      } catch (error) {
        setStatus(error.message || "Failed to verify OTP.", "error");
      }
    });

    resendOtpBtn?.addEventListener("click", async () => {
      try {
        await requestOtp();
      } catch (error) {
        setStatus(error.message || "Failed to resend OTP.", "error");
      }
    });

    goHomeBtn?.addEventListener("click", () => {
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
